<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}
body{background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);color:white;padding-left:220px;}
.logo{font-weight:700;}
nav ul{display:flex;list-style:none;gap:30px;}
nav ul li a{color:white;text-decoration:none;}
nav ul li a:hover{color:#00ffe7;}
.sidebar{position:fixed;left:0;top:0;width:220px;height:100%;background:#0f2027;padding-top:90px;z-index:1000;box-shadow:5px 0 20px rgba(0,0,0,0.4);}
.sidebar a{display:block;padding:16px 30px;color:white;text-decoration:none;border-bottom:1px solid rgba(255,255,255,0.08);transition:0.2s;}
.sidebar a:hover,.sidebar a.active{background:#00ffe7;color:black;padding-left:40px;}
section{padding:100px 50px 80px;}
.title{text-align:center;margin-bottom:50px;}
.title h2{font-size:32px;}
.title span{color:#00ffe7;}
.kontak-wrap{display:flex;gap:40px;max-width:1000px;margin:0 auto;flex-wrap:wrap;}
.kontak-info{flex:1;min-width:260px;}
.kontak-info h3{color:#00ffe7;margin-bottom:24px;font-size:18px;}
.info-item{display:flex;align-items:center;gap:16px;margin-bottom:20px;background:rgba(255,255,255,0.06);padding:16px;border-radius:12px;border:1px solid rgba(0,255,231,0.1);transition:0.3s;}
.info-item:hover{border-color:#00ffe7;}
.info-item .icon{width:42px;height:42px;border-radius:50%;background:rgba(0,255,231,0.15);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.info-item .detail h4{font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:2px;}
.info-item .detail p{font-size:14px;}
.info-item .detail a{color:white;text-decoration:none;}
.info-item .detail a:hover{color:#00ffe7;}
.sosmed{display:flex;gap:12px;margin-top:24px;}
.sosmed a{width:42px;height:42px;border-radius:50%;border:1px solid #00ffe7;display:flex;align-items:center;justify-content:center;color:#00ffe7;font-size:16px;text-decoration:none;transition:0.3s;}
.sosmed a:hover{background:#00ffe7;color:black;}
.kontak-form{flex:1;min-width:280px;}
.kontak-form h3{color:#00ffe7;margin-bottom:24px;font-size:18px;}
.form-group{margin-bottom:18px;}
.form-group label{display:block;font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:6px;}
.form-group input,.form-group textarea{width:100%;padding:12px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(0,255,231,0.2);border-radius:10px;color:white;font-size:14px;font-family:'Montserrat',sans-serif;outline:none;transition:0.3s;}
.form-group input:focus,.form-group textarea:focus{border-color:#00ffe7;background:rgba(0,255,231,0.05);}
.form-group textarea{resize:vertical;min-height:120px;}
.submit-btn{width:100%;padding:14px;background:#00ffe7;color:black;border:none;border-radius:25px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif;transition:0.3s;}
.submit-btn:hover{background:#33fff0;transform:scale(1.02);}
.toast{display:none;position:fixed;bottom:30px;right:30px;background:#00ffe7;color:black;padding:14px 24px;border-radius:12px;font-weight:600;font-size:14px;z-index:3000;}
footer{background:black;text-align:center;padding:25px;font-size:13px;}
</style>
</head>

<section>
  <div class="title"><h2>Hubungi <span>Saya</span></h2></div>
  <div class="kontak-wrap">
    <div class="kontak-info">
      <h3>Informasi Kontak</h3>
      <div class="info-item">
        <div class="icon">📧</div>
        <div class="detail">
          <h4>Email</h4>
          <p><a href="mailto:jasson@email.com">jassonalfarro07@gmail.com</a></p>
        </div>
      </div>
      <div class="info-item">
        <div class="icon">📱</div>
        <div class="detail">
          <h4>No HP / WhatsApp</h4>
          <p>0822-5888-7788</p>
        </div>
      </div>
      <div class="info-item">
        <div class="icon">📍</div>
        <div class="detail">
          <h4>Lokasi</h4>
          <p>Batam, Indonesia</p>
        </div>
      </div>
      <div class="info-item">
        <div class="icon">🎓</div>
        <div class="detail">
          <h4>Universitas</h4>
          <p>Universitas Internasional Batam</p>
        </div>
      </div>
      <div class="sosmed">
        <a href="#" title="GitHub">⌨</a>
        <a href="#" title="LinkedIn">in</a>
        <a href="#" title="Instagram">📷</a>
        <a href="#" title="Twitter/X">X</a>
      </div>
    </div>
    <div class="kontak-form">
      <h3>Kirim Pesan</h3>
      <div class="form-group">
        <label>Nama Lengkap</label>
        <input type="text" id="nama" placeholder="Masukkan nama kamu">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Masukkan email kamu">
      </div>
      <div class="form-group">
        <label>Subjek</label>
        <input type="text" id="subjek" placeholder="Subjek pesan">
      </div>
      <div class="form-group">
        <label>Pesan</label>
        <textarea id="pesan" placeholder="Tulis pesanmu di sini..."></textarea>
      </div>
      <button class="submit-btn" onclick="kirim()">Kirim Pesan</button>
    </div>
  </div>
</section>
<div class="toast" id="toast">✅ Pesan berhasil dikirim!</div>
<script>
function kirim(){
  const nama=document.getElementById('nama').value;
  const email=document.getElementById('email').value;
  const pesan=document.getElementById('pesan').value;
  if(!nama||!email||!pesan){alert('Harap isi semua kolom yang diperlukan.');return;}
  const toast=document.getElementById('toast');
  toast.style.display='block';
  setTimeout(()=>{toast.style.display='none';},3000);
  document.getElementById('nama').value='';
  document.getElementById('email').value='';
  document.getElementById('subjek').value='';
  document.getElementById('pesan').value='';
}
</script>
